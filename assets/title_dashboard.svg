<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 40" width="100%" height="40">
  <defs>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1DC7B5" />
      <stop offset="100%" stop-color="#1D99F3" />
    </linearGradient>
  </defs>
  <style>
    .text { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 800; fill: #0f172a; letter-spacing: 2px; text-transform: uppercase; }
    .bar { fill: url(#bar-grad); rx: 3px; }
    @media (prefers-color-scheme: dark) {
      .text { fill: #f8fafc; }
    }
  </style>
  <rect x="0" y="8" width="6" height="24" class="bar" />
  <text x="20" y="25" class="text">⚡ ECOSYSTEM &amp; TECH DASHBOARD</text>
</svg>

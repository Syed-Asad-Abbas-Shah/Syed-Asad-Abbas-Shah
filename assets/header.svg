<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-gradient-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f7fa" />
    </linearGradient>
    <linearGradient id="bg-gradient-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Circuit Glowing Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Engineering Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" class="grid-line" stroke-width="0.5" />
    </pattern>
  </defs>

  <style>
    /* Default (Light Mode) Styles */
    .bg { fill: url(#bg-gradient-light); transition: fill 0.3s ease; }
    .grid-line { stroke: rgba(0, 0, 0, 0.03); }
    .title { font-family: 'Charter', 'Bookerly', 'Amazon Bookerly', 'Georgia', 'Times New Roman', serif; font-size: 36px; font-weight: 700; fill: #131921; transition: fill 0.3s ease; }
    .subtitle { font-family: 'Amazon Ember', 'Inter', -apple-system, sans-serif; font-size: 15px; font-weight: 600; fill: #232F3E; letter-spacing: 2px; text-transform: uppercase; transition: fill 0.3s ease; }
    .tagline { font-family: 'Amazon Ember', 'Inter', -apple-system, sans-serif; font-size: 13.5px; fill: #565959; transition: fill 0.3s ease; }
    .accent-line { stroke: #FF9900; stroke-width: 3.5; stroke-linecap: round; filter: url(#glow-orange); }
    .circuit-line { stroke: #d0d7de; stroke-width: 1.5; fill: none; transition: stroke 0.3s ease; }
    .circuit-node-orange { fill: #FF9900; filter: url(#glow-orange); }
    .circuit-node-blue { fill: #007185; filter: url(#glow-blue); transition: fill 0.3s ease; }
    .chip-border { stroke: #232F3E; stroke-width: 1.5; fill: none; transition: stroke 0.3s ease; }

    /* Dark Mode Override */
    @media (prefers-color-scheme: dark) {
      .bg { fill: url(#bg-gradient-dark); }
      .grid-line { stroke: rgba(255, 255, 255, 0.02); }
      .title { fill: #ffffff; }
      .subtitle { fill: #FF9900; }
      .tagline { fill: #c9d1d9; }
      .circuit-line { stroke: #30363d; }
      .circuit-node-blue { fill: #58a6ff; }
      .chip-border { stroke: #FF9900; }
    }
  </style>
  
  <!-- Background Card with Premium Gradient -->
  <rect width="100%" height="100%" rx="12" class="bg" />
  
  <!-- Engineering Grid overlay for a high-tech CAD/Hardware Design vibe -->
  <rect width="100%" height="100%" rx="12" fill="url(#grid)" />
  
  <!-- Decorative Glowing Circuit Diagram (Right side) -->
  <g opacity="0.8">
    <!-- Lines -->
    <path d="M 590 30 L 680 30 L 710 60 L 760 60" class="circuit-line" />
    <path d="M 640 190 L 640 130 L 670 100 L 750 100" class="circuit-line" />
    <path d="M 560 110 L 600 110 L 620 90 L 620 60" class="circuit-line" />
    <path d="M 680 30 L 680 70 M 710 60 L 710 110" class="circuit-line" />
    
    <!-- Nodes -->
    <circle cx="590" cy="30" r="4" class="circuit-node-orange" />
    <circle cx="760" cy="60" r="4" class="circuit-node-orange" />
    <circle cx="750" cy="100" r="4" class="circuit-node-blue" />
    <circle cx="560" cy="110" r="4" class="circuit-node-blue" />
    <circle cx="620" cy="60" r="3" class="circuit-node-orange" />
    
    <!-- Microchip representation -->
    <rect x="650" y="55" width="45" height="45" rx="4" class="chip-border" fill-opacity="0.03" />
    <rect x="660" y="65" width="25" height="25" rx="2" fill="#FF9900" opacity="0.12" />
  </g>

  <!-- Title & Text Info -->
  <g transform="translate(45, 0)">
    <!-- Main Title: Syed Asad Abbas Shah -->
    <text x="0" y="72" class="title">Syed Asad Abbas Shah</text>
    
    <!-- Decorative accent divider with glowing filter -->
    <line x1="0" y1="92" x2="420" y2="92" class="accent-line" />
    
    <!-- Subtitle (Role) -->
    <text x="0" y="128" class="subtitle">Computer Engineering &amp; Hardware Design</text>
    
    <!-- Tagline (Interests) -->
    <text x="0" y="162" class="tagline">Specializing in hardware automation, network protocols, and Linux performance.</text>
    <text x="0" y="182" class="tagline">"Solving complex problems through precision and continuous learning."</text>
  </g>
</svg>

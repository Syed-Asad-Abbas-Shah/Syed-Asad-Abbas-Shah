<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220" preserveAspectRatio="xMidYMid meet">
  <style>
    /* Default (Light Mode) Styles */
    .bg { fill: #ffffff; transition: fill 0.3s ease; }
    .title { font-family: 'Bookerly', 'Lora', 'Georgia', 'Times New Roman', serif; font-size: 38px; font-weight: 700; fill: #131921; transition: fill 0.3s ease; }
    .subtitle { font-family: 'Amazon Ember', 'Inter', -apple-system, sans-serif; font-size: 16px; font-weight: 600; fill: #232F3E; letter-spacing: 2px; text-transform: uppercase; transition: fill 0.3s ease; }
    .tagline { font-family: 'Amazon Ember', 'Inter', -apple-system, sans-serif; font-size: 14px; fill: #565959; transition: fill 0.3s ease; }
    .accent-line { stroke: #FF9900; stroke-width: 3; stroke-linecap: round; }
    .circuit-line { stroke: #e0e0e0; stroke-width: 1.5; fill: none; transition: stroke 0.3s ease; }
    .circuit-node { fill: #FF9900; }
    .circuit-node-secondary { fill: #232F3E; transition: fill 0.3s ease; }

    /* Dark Mode Override */
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .title { fill: #ffffff; }
      .subtitle { fill: #FF9900; }
      .tagline { fill: #c9d1d9; }
      .circuit-line { stroke: #30363d; }
      .circuit-node-secondary { fill: #58a6ff; }
    }
  </style>
  
  <!-- Background Card -->
  <rect width="100%" height="100%" rx="12" class="bg" />
  
  <!-- Decorative Circuit Diagram (Right side) representing Computer/Hardware Engineering -->
  <g opacity="0.85">
    <path d="M 600 30 L 680 30 L 710 60 L 760 60" class="circuit-line" />
    <path d="M 640 190 L 640 130 L 670 100 L 750 100" class="circuit-line" />
    <path d="M 570 110 L 600 110 L 620 90 L 620 60" class="circuit-line" />
    <path d="M 680 30 L 680 70 M 710 60 L 710 110" class="circuit-line" />
    
    <!-- Nodes -->
    <circle cx="600" cy="30" r="4" class="circuit-node" />
    <circle cx="760" cy="60" r="4" class="circuit-node" />
    <circle cx="750" cy="100" r="4" class="circuit-node-secondary" />
    <circle cx="570" cy="110" r="4" class="circuit-node-secondary" />
    <circle cx="620" cy="60" r="3" class="circuit-node" />
    
    <!-- Microchip representational box -->
    <rect x="650" y="55" width="45" height="45" rx="4" class="circuit-line" fill-opacity="0.05" />
    <rect x="660" y="65" width="25" height="25" rx="2" fill="#FF9900" opacity="0.15" />
  </g>

  <!-- Title & Text Info -->
  <g transform="translate(45, 0)">
    <!-- Main Title -->
    <text x="0" y="75" class="title">Syed Asad Shah</text>
    
    <!-- Decorative accent divider -->
    <line x1="0" y1="95" x2="360" y2="95" class="accent-line" />
    
    <!-- Subtitle (Role) -->
    <text x="0" y="130" class="subtitle">Computer Engineering &amp; Hardware Design</text>
    
    <!-- Tagline (Interests) -->
    <text x="0" y="165" class="tagline">Specializing in hardware automation, network protocols, and Linux performance.</text>
    <text x="0" y="185" class="tagline">"Solving complex problems through precision and continuous learning."</text>
  </g>
</svg>
